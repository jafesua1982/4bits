<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title><span th:text="#{propiedad.editar.titulo}"/></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
    <div class="starter-template">
        <h1><span th:text="#{empresa}" /></h1>
        <h2 th:text="${formBean.id} ? #{propiedad.editar.titulo} : #{propiedad.registrar.titulo}" />
    </div>

    <form th:action="@{/propiedadEditar}" th:object="${formBean}" method="post">
        <p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error" />
        <input type="hidden" th:field="*{id}">

        <table border="0" style="align-self: center;">
            <tr>
                <td><label th:text="#{propiedad.direccion}" /></td>
                <td><input type="text" th:field="*{direccion}" /></td>
                <td><p th:if="${#fields.hasErrors('direccion')}" th:errorclass="error" th:errors="*{direccion}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.ciudad}" /></td>
                <td>
                    <select th:field="*{idCiudad}">
                        <option value="">Seleccionar...</option>
                        <option th:each="c : ${allCiudades}"
                                th:value="${c.id}"
                                th:text="${c.nombre}"></option>
                    </select>
                </td>
                <td><p th:if="${#fields.hasErrors('idCiudad')}" th:errorclass="error" th:errors="*{idCiudad}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.tipo}" /></td>
                <td>
                    <select th:field="*{tipo}">
                        <option value="">Seleccionar...</option>
                        <option th:each="t : ${allTipos}"
                                th:value="${t}"
                                th:text="${t}"></option>
                    </select>
                </td>
                <td><p th:if="${#fields.hasErrors('tipo')}" th:errorclass="error" th:errors="*{tipo}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.ambientes}" /></td>
                <td><input type="number" th:field="*{cantidadAmbientes}" min="1" /></td>
                <td><p th:if="${#fields.hasErrors('cantidadAmbientes')}" th:errorclass="error" th:errors="*{cantidadAmbientes}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.metros}" /></td>
                <td><input type="number" th:field="*{metrosCuadrados}" min="1" step="0.01" /></td>
                <td><p th:if="${#fields.hasErrors('metrosCuadrados')}" th:errorclass="error" th:errors="*{metrosCuadrados}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.estado}" /></td>
                <td>
                    <select th:field="*{estadoDisponibilidad}">
                        <option th:each="e : ${allEstados}"
                                th:value="${e}"
                                th:text="${e}"></option>
                    </select>
                </td>
                <td><p th:if="${#fields.hasErrors('estadoDisponibilidad')}" th:errorclass="error" th:errors="*{estadoDisponibilidad}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.propietario}" /></td>
                <td>
                    <select th:field="*{idPropietario}">
                        <option value="">Seleccionar...</option>
                        <option th:each="p : ${allPersonas}"
                                th:value="${p.id}"
                                th:text="${p.apellido + ', ' + p.nombre}"></option>
                    </select>
                </td>
                <td><p th:if="${#fields.hasErrors('idPropietario')}" th:errorclass="error" th:errors="*{idPropietario}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.descripcion}" /></td>
                <td><textarea th:field="*{descripcion}" rows="3" cols="40"></textarea></td>
            </tr>
            <tr>
                <td><label th:text="#{propiedad.comodidades}" /></td>
                <td><textarea th:field="*{comodidades}" rows="2" cols="40"></textarea></td>
            </tr>
        </table>

        <table class="botones">
            <tr>
                <td><button type="submit" name="action" value="actionAceptar" th:text="#{botones.aceptar}"/></td>
                <td><button type="submit" name="action" value="actionCancelar" th:text="#{botones.cancelar}"/></td>
            </tr>
        </table>
    </form>
</body>
</html>
