<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title><span th:text="#{persona.editar.titulo}"/></title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
    <div class="starter-template">
        <h1><span th:text="#{empresa}" /></h1>
        <h2 th:text="${formBean.id} ? #{persona.editar.titulo} : #{persona.registrar.titulo}" />
    </div>

    <form th:action="@{/personasEditar}" th:object="${formBean}" method="post">
        <p th:each="err : ${#fields.errors('global')}" th:text="${err}" class="error" />
        <input type="hidden" th:field="*{id}">
        <table border="0" style="align-self: center;">
            <tr>
                <td><label th:text="#{persona.nombre}" /></td>
                <td><input type="text" th:field="*{nombre}" /></td>
                <td><p th:if="${#fields.hasErrors('nombre')}" th:errorclass="error" th:errors="*{nombre}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{persona.apellido}" /></td>
                <td><input type="text" th:field="*{apellido}" /></td>
                <td><p th:if="${#fields.hasErrors('apellido')}" th:errorclass="error" th:errors="*{apellido}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{persona.dniCuit}" /></td>
                <td><input type="text" th:field="*{dniCuit}" /></td>
                <td><p th:if="${#fields.hasErrors('dniCuit')}" th:errorclass="error" th:errors="*{dniCuit}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{persona.telefono}" /></td>
                <td><input type="text" th:field="*{telefono}" /></td>
                <td><p th:if="${#fields.hasErrors('telefono')}" th:errorclass="error" th:errors="*{telefono}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{persona.email}" /></td>
                <td><input type="text" th:field="*{email}" /></td>
                <td><p th:if="${#fields.hasErrors('email')}" th:errorclass="error" th:errors="*{email}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{persona.domicilio}" /></td>
                <td><input type="text" th:field="*{domicilio}" /></td>
                <td><p th:if="${#fields.hasErrors('domicilio')}" th:errorclass="error" th:errors="*{domicilio}" /></td>
            </tr>
            <tr>
                <td><label th:text="#{persona.ciudad}" /></td>
                <td>
                    <select th:field="*{idCiudad}">
                        <option value="">Seleccionar...</option>
                        <option th:each="c : ${allCiudades}"
                                th:value="${c.id}"
                                th:text="${c.nombre}"></option>
                    </select>
                </td>
            </tr>
        </table>
        <table class="botones">
            <tr>
                <td><button type="submit" name="action" value="Aceptar" th:text="#{botones.aceptar}"/></td>
                <td><button type="submit" name="action" value="Cancelar" th:text="#{botones.cancelar}"/></td>
            </tr>
        </table>
    </form>
</body>
</html>
